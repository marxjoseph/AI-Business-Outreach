<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>Review Emails</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="{{ url_for('static', filename='styles/index.css') }}" rel="stylesheet">
    </head>
    <body>
        <h1>Review & Send</h1>
        <div class="verify-container">
            <form action="/send-confirmed" method="POST">
                {% for result in results %}
                {% set outer_index = loop.index0 %}
                <div class="card">
                    <h4>{{ result.name }}</h4>
                    <p class="url-label"><a href="{{ result.url }}" target="_blank">{{ result.url }}</a></p>

                    <label class="section-label">Generated Email</label>
                    <textarea name="email_body_{{ outer_index }}" class="email-textarea form-control">{{ result.email_body }}</textarea>

                    <label class="section-label mt-3">Send To</label>
                    {% if result.found_emails %}
                        {% for email in result.found_emails %}
                        <div class="form-check email-option">
                            <input class="form-check-input" type="radio" name="chosen_email_{{ outer_index }}" value="{{ email }}">
                            <label class="form-check-label">{{ email }}</label>
                        </div>
                        {% endfor %}
                    {% else %}
                        <p class="no-emails">No emails found for this business.</p>
                    {% endif %}
                    <div class="form-check email-option dont-send-option">
                        <input class="form-check-input" type="radio" name="chosen_email_{{ outer_index }}" value="" checked>
                        <label class="form-check-label text-muted">Don't send</label>
                    </div>
                </div>
                {% endfor %}

                <div class="text-center mt-4 mb-5">
                    <a href="/" class="btn btn-secondary mr-3">Back</a>
                    <button type="submit" class="btn btn-primary">Send All</button>
                </div>
            </form>
        </div>
    </body>
</html>
