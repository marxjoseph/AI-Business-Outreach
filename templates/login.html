<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="{{ url_for('static', filename='styles/index.css') }}" rel="stylesheet">
    </head>
    <body>
        <div class="login-container">
            <h1>Mural Outreach</h1>
            <div class="login-card">
                <h5>Sign In</h5>
                {% if error %}
                <div class="alert alert-danger py-2">{{ error }}</div>
                {% endif %}
                <form action="/login" method="POST">
                    <div class="form-group">
                        <input name="username" class="form-control login-input" type="text" placeholder="Username" required>
                    </div>
                    <div class="form-group">
                        <input name="password" class="form-control login-input" type="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                </form>
            </div>
        </div>
    </body>
</html>
